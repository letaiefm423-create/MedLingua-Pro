<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MedLingua — Language Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════════════ */
:root{
  --primary:#2563EB;--primary-d:#1D4ED8;--primary-dd:#1E3A8A;
  --primary-l:#EFF6FF;--primary-ll:#DBEAFE;
  --success:#059669;--success-l:#ECFDF5;--success-ll:#A7F3D0;
  --danger:#DC2626;--danger-l:#FEF2F2;
  --warning:#D97706;--warning-l:#FEF3C7;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --pink:#DB2777;--pink-l:#FDF2F8;
  --teal:#0D9488;--teal-l:#F0FDFA;
  --orange:#EA580C;--orange-l:#FFF7ED;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;
  --g800:#1F2937;--g900:#111827;
  --white:#fff;
  --r:10px;--rl:16px;--rxl:22px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
  --shadow-lg:0 8px 30px rgba(0,0,0,.11);
  --shadow-xl:0 16px 50px rgba(0,0,0,.13);
  --font:'Inter',system-ui,sans-serif;
  --t:.2s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--g50);color:var(--g900);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
input,textarea{font-family:var(--font);outline:none}
a{text-decoration:none;color:inherit}

/* ══════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(.84)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
@keyframes slideLeft{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes bounceY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes ripple{from{transform:scale(0);opacity:.6}to{transform:scale(2.5);opacity:0}}
.au{animation:fadeUp .32s ease both}
.ai{animation:fadeIn .22s ease both}
.ap{animation:popIn .36s cubic-bezier(.34,1.56,.64,1) both}
.asr{animation:slideRight .25s ease both}
.asl{animation:slideLeft .25s ease both}

/* ══════════════════════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════════════════════ */
.screen{display:none!important}
.screen.on{display:flex!important;flex-direction:column;min-height:100dvh}

/* ══════════════════════════════════════════════════════
   WELCOME SCREEN
══════════════════════════════════════════════════════ */
#s-welcome{background:linear-gradient(155deg,#0F172A 0%,#1E3A8A 35%,#1D4ED8 65%,#2563EB 100%)}
.w-hero{text-align:center;padding:52px 24px 28px;position:relative}
.w-hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(96,165,250,.12),transparent);pointer-events:none}
.w-logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px}
.w-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(59,130,246,.4)}
.w-brand{font-size:34px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1}
.w-brand em{color:#FCD34D;font-style:normal}
.w-tagline{font-size:15px;color:rgba(255,255,255,.72);font-weight:400;line-height:1.5;max-width:340px;margin:0 auto 22px}
.w-features{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.w-feat{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,.88);font-weight:500}

.w-card{background:var(--white);border-radius:26px 26px 0 0;flex:1;padding:30px 20px 100px;margin-top:6px}
.w-section{margin-bottom:28px}
.w-label{font-size:11.5px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.w-step{width:22px;height:22px;background:var(--primary);color:#fff;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.lang-btn{display:flex;align-items:center;gap:10px;padding:13px 14px;border:2px solid var(--g200);border-radius:var(--r);background:var(--white);transition:all var(--t);cursor:pointer;width:100%;text-align:left;position:relative;overflow:hidden}
.lang-btn::after{content:'';position:absolute;inset:0;background:var(--primary);opacity:0;transition:opacity var(--t)}
.lang-btn:hover:not([disabled]){border-color:var(--primary);background:var(--primary-l)}
.lang-btn.sel{border-color:var(--primary);background:var(--primary-l);box-shadow:0 0 0 3px rgba(37,99,235,.13)}
.lang-btn[disabled]{opacity:.28;pointer-events:none}
.l-flag{font-size:26px;line-height:1;flex-shrink:0;position:relative;z-index:1}
.l-info{position:relative;z-index:1}
.l-name{font-size:13px;font-weight:700;color:var(--g800);line-height:1.2}
.l-nat{font-size:11px;color:var(--g400);margin-top:1px}
.w-cta{width:100%;padding:16px;background:var(--primary);color:#fff;border-radius:var(--rl);font-size:16px;font-weight:700;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.1px;margin-top:6px}
.w-cta:hover:not(:disabled){background:var(--primary-d);box-shadow:0 6px 22px rgba(37,99,235,.4);transform:translateY(-2px)}
.w-cta:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ══════════════════════════════════════════════════════
   APP HEADER
══════════════════════════════════════════════════════ */
.app-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:300;box-shadow:var(--shadow-xs)}
.hdr-logo{font-size:19px;font-weight:800;color:var(--primary);letter-spacing:-.3px;flex-shrink:0}
.hdr-logo em{color:#F59E0B;font-style:normal}
.hdr-pair{display:flex;align-items:center;gap:4px;background:var(--g100);border:1px solid var(--g200);border-radius:20px;padding:4px 11px;font-size:11.5px;font-weight:600;color:var(--g600);margin-left:auto;white-space:nowrap}
.hdr-back{width:36px;height:36px;background:var(--g100);border:1.5px solid var(--g200);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--g600);transition:all var(--t);flex-shrink:0}
.hdr-back:hover{background:var(--primary-l);border-color:var(--primary-ll);color:var(--primary)}

/* ══════════════════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════════════════ */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1.5px solid var(--g200);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;background:none;font-size:9.5px;font-weight:700;color:var(--g400);letter-spacing:.3px;text-transform:uppercase;transition:color var(--t)}
.bnav-btn.on{color:var(--primary)}
.bnav-icon{font-size:22px;transition:transform var(--t)}
.bnav-btn.on .bnav-icon{transform:scale(1.1)}

/* ══════════════════════════════════════════════════════
   PAGE CONTENT
══════════════════════════════════════════════════════ */
.page{flex:1;overflow-y:auto;padding-bottom:74px}

/* ══════════════════════════════════════════════════════
   DASHBOARD / HOME
══════════════════════════════════════════════════════ */
.dash-banner{background:linear-gradient(140deg,#0F172A 0%,#1E3A8A 45%,#2563EB 100%);padding:22px 18px 26px;color:#fff;position:relative;overflow:hidden}
.db-deco{position:absolute;border-radius:50%}
.db-deco1{width:240px;height:240px;background:rgba(255,255,255,.04);top:-80px;right:-60px}
.db-deco2{width:160px;height:160px;background:rgba(255,255,255,.05);bottom:-50px;left:20px}
.db-greet{font-size:13px;font-weight:400;opacity:.72;margin-bottom:3px;position:relative;z-index:1}
.db-title{font-size:22px;font-weight:800;line-height:1.25;margin-bottom:10px;position:relative;z-index:1}
.db-pair{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;position:relative;z-index:1}
.prog-bar-wrap{background:rgba(255,255,255,.14);border-radius:14px;padding:14px;margin-top:18px;position:relative;z-index:1}
.pb-row{display:flex;justify-content:space-between;margin-bottom:8px}
.pb-lbl{font-size:12px;opacity:.78;font-weight:500}
.pb-val{font-size:13px;font-weight:800}
.pb-track{height:8px;background:rgba(255,255,255,.22);border-radius:4px;overflow:hidden}
.pb-fill{height:100%;background:#fff;border-radius:4px;transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.pb-note{font-size:11px;opacity:.68;margin-top:7px}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 14px 4px}
.stat-c{background:var(--white);border-radius:var(--rl);border:1px solid var(--g200);padding:13px 10px;text-align:center;box-shadow:var(--shadow-xs)}
.stat-v{font-size:28px;font-weight:900;line-height:1}
.stat-l{font-size:10px;color:var(--g500);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.sec-ttl{font-size:11px;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.7px}

/* Level rows */
.lv-list{display:flex;flex-direction:column;gap:9px;padding:0 12px 16px}
.lv-row{display:flex;align-items:center;gap:13px;background:var(--white);border-radius:var(--rl);border:2px solid var(--g200);padding:15px 13px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.lv-row:hover{transform:translateX(4px);box-shadow:var(--shadow-md);border-color:var(--g300)}
.lv-row.lv-done{border-color:var(--success)}
.lv-badge{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;letter-spacing:-.3px}
.lv-info{flex:1;min-width:0}
.lv-name{font-size:15px;font-weight:700;margin-bottom:2px}
.lv-sub{font-size:11px;color:var(--g400);margin-bottom:7px}
.lv-mbar{height:5px;background:var(--g200);border-radius:3px;overflow:hidden;max-width:200px}
.lv-mfill{height:100%;border-radius:3px;transition:width .7s ease}
.lv-pct{font-size:10px;color:var(--g400);margin-top:4px;font-weight:600}
.lv-arrow{margin-left:auto;font-size:20px;color:var(--g300);flex-shrink:0}

/* ══════════════════════════════════════════════════════
   TOPICS GRID
══════════════════════════════════════════════════════ */
.tp-hdr{padding:18px 16px 8px;display:flex;align-items:center;gap:11px}
.tp-pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;color:#fff}
.tp-title{font-size:19px;font-weight:800}
.tp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:10px 12px 20px}
.tp-card{background:var(--white);border-radius:var(--rl);border:2px solid var(--g200);padding:22px 12px;text-align:center;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.tp-card:hover{border-color:var(--primary);background:var(--primary-l);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.tp-card.tp-done{border-color:var(--success);background:var(--success-l)}
.tp-card:hover .tc-ico{transform:scale(1.12) rotate(-4deg)}
.tc-ico{font-size:36px;line-height:1;display:block;margin-bottom:10px;transition:transform .22s}
.tc-name{font-size:13.5px;font-weight:700;color:var(--g800);margin-bottom:3px}
.tc-wc{font-size:11px;color:var(--g400);font-weight:500}
.tc-check{position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900}

/* ══════════════════════════════════════════════════════
   LESSON
══════════════════════════════════════════════════════ */
.ls-topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:56px;z-index:100}
.ls-meta{flex:1;min-width:0}
.ls-tag{font-size:10px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ls-title{font-size:16px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ls-tabs{display:flex;background:var(--white);border-bottom:1.5px solid var(--g200);padding:0 16px;overflow-x:auto;scrollbar-width:none}
.ls-tabs::-webkit-scrollbar{display:none}
.ls-tab{padding:11px 14px;background:none;font-size:13px;font-weight:600;color:var(--g400);border-bottom:3px solid transparent;margin-bottom:-1.5px;transition:all var(--t);cursor:pointer;white-space:nowrap;flex-shrink:0}
.ls-tab.on{color:var(--primary);border-bottom-color:var(--primary)}

/* Vocab tab */
.v-pane{padding:14px}
.v-intro{background:var(--primary-l);border:1px solid var(--primary-ll);border-radius:var(--r);padding:12px 15px;margin-bottom:16px}
.v-intro-rule{font-size:10px;font-weight:800;color:var(--primary-dd);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.v-intro-txt{font-size:13px;color:var(--primary-dd);font-weight:400;line-height:1.55}
.v-items{display:flex;flex-direction:column;gap:9px}
.v-item{background:var(--white);border-radius:var(--r);border:1.5px solid var(--g200);padding:13px 13px;display:flex;align-items:center;gap:12px;transition:border-color var(--t)}
.v-item:hover{border-color:var(--primary-ll)}
.vi-emo{font-size:27px;flex-shrink:0;width:38px;text-align:center}
.vi-txts{flex:1;min-width:0}
.vi-tgt{font-size:17px;font-weight:700;line-height:1.2;color:var(--g900)}
.vi-sep{display:block;font-size:9px;color:var(--g300);margin:3px 0}
.vi-n-lbl{font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
.vi-nat{font-size:13px;color:var(--g500);font-weight:400}
.vi-actions{display:flex;flex-direction:column;gap:7px;align-items:center;flex-shrink:0}
.aud-btn{width:36px;height:36px;border-radius:9px;background:var(--primary-l);color:var(--primary);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.aud-btn:hover{background:var(--primary-ll);transform:scale(1.08)}
.aud-btn:active{transform:scale(.93)}
.save-btn{width:36px;height:36px;border-radius:9px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all var(--t);background:var(--g100);color:var(--g400)}
.save-btn:hover{background:var(--warning-l);color:var(--warning)}
.save-btn.saved{background:var(--warning-l);color:var(--warning)}

/* Examples tab */
.e-pane{padding:14px}
.e-intro-box{background:var(--g100);border:1px solid var(--g200);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--g600)}
.e-card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--g200);padding:16px;margin-bottom:10px}
.e-num{font-size:9.5px;font-weight:800;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:9px}
.e-tgt-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.e-tgt-txt{font-size:15px;font-weight:600;color:var(--g900);line-height:1.45;flex:1}
.e-nat-wrap{border-top:1px solid var(--g100);padding-top:9px}
.e-nat-lbl{font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.e-nat-txt{font-size:13px;color:var(--g500);font-weight:400;line-height:1.5}

/* Quiz CTA */
.q-cta{margin:6px 12px 20px;background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 50%,#2563EB 100%);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .22s;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:14px}
.q-cta:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.qcta-icon{font-size:38px;flex-shrink:0}
.qcta-ttl{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px}
.qcta-sub{font-size:12px;color:rgba(255,255,255,.72);font-weight:400}
.qcta-arr{margin-left:auto;font-size:22px;color:rgba(255,255,255,.45);flex-shrink:0}

/* ══════════════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════════════ */
.qz-wrap{padding:18px;max-width:520px;margin:0 auto}
.qz-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.qz-bar{flex:1;height:9px;background:var(--g200);border-radius:5px;overflow:hidden}
.qz-fill{height:100%;background:var(--primary);border-radius:5px;transition:width .4s ease}
.qz-ctr{font-size:12px;font-weight:700;color:var(--g400);white-space:nowrap}
.qz-card{background:var(--white);border-radius:var(--rxl);border:2px solid var(--g200);padding:26px 22px 22px;text-align:center;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.qz-lvl{font-size:10px;font-weight:800;color:var(--g300);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.qz-word{font-size:30px;font-weight:900;color:var(--g900);margin-bottom:7px;line-height:1.2}
.qz-instr{font-size:13px;color:var(--g400);font-weight:400;margin-bottom:4px}
.qz-play{margin:12px auto 0;width:46px;height:46px;background:var(--primary-l);border-radius:50%;font-size:19px;display:flex;align-items:center;justify-content:center;transition:all var(--t);color:var(--primary)}
.qz-play:hover{background:var(--primary-ll);transform:scale(1.1)}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.ans-btn{padding:16px 11px;background:var(--white);border:2px solid var(--g200);border-radius:var(--r);font-size:13.5px;font-weight:600;text-align:center;transition:all .2s;cursor:pointer;line-height:1.3;min-height:54px;display:flex;align-items:center;justify-content:center}
.ans-btn:hover:not(.qlk){border-color:var(--primary);background:var(--primary-l);color:var(--primary);transform:translateY(-2px)}
.ans-btn.ans-ok{border-color:var(--success);background:var(--success-l);color:var(--success)}
.ans-btn.ans-no{border-color:var(--danger);background:var(--danger-l);color:var(--danger);animation:shakeX .35s ease}
.ans-btn.ans-reveal{border-color:var(--success);background:var(--success-l);color:var(--success)}
.ans-btn.qlk{cursor:not-allowed;pointer-events:none}
.fb-row{text-align:center;padding:2px 0 14px;min-height:34px}
.fb-chip{display:inline-block;padding:6px 18px;border-radius:20px;font-size:13.5px;font-weight:700}
.fb-ok{background:var(--success-l);color:var(--success)}
.fb-no{background:var(--danger-l);color:var(--danger)}
.qz-next-row{text-align:center;padding-bottom:8px}
.qz-result{text-align:center;padding:32px 20px}
.qr-emo{font-size:74px;display:block;margin-bottom:14px;animation:bounceY .9s ease infinite}
.qr-sc{font-size:82px;font-weight:900;line-height:1;margin-bottom:4px}
.qr-of{font-size:15px;color:var(--g400);margin-bottom:8px;font-weight:500}
.qr-msg{font-size:21px;font-weight:800;margin-bottom:6px}
.qr-sub{font-size:14px;color:var(--g500);margin-bottom:30px;font-weight:400}

.sw-item{display:flex;align-items:center;gap:11px;background:var(--white);border-radius:var(--r);border:1px solid var(--g200);padding:12px 13px;transition:all var(--t)}
.sw-item:hover{border-color:var(--primary-ll);box-shadow:var(--shadow-xs);transform:translateX(2px)}
.sw-emo{font-size:27px;flex-shrink:0}

.sw-tgt{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis}
.sw-nat{font-size:12px;color:var(--g400);margin-top:1px}
.sw-rm{width:30px;height:30px;border-radius:7px;background:var(--danger-l);color:var(--danger);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.sw-rm:hover{background:var(--danger);color:#fff}

.empty-box{text-align:center;padding:60px 22px}
.em-ico{font-size:56px;display:block;margin-bottom:16px}
.em-ttl{font-size:18px;font-weight:700;margin-bottom:7px}
.em-sub{font-size:14px;color:var(--g400);margin-bottom:22px;line-height:1.6}

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 22px;border-radius:var(--r);font-size:14px;font-weight:600;transition:all var(--t);cursor:pointer;white-space:nowrap}
.btn-p{background:var(--primary);color:#fff}
.btn-p:hover{background:var(--primary-d);box-shadow:0 4px 16px rgba(37,99,235,.35);transform:translateY(-1px)}
.btn-s{background:var(--g100);color:var(--g700);border:1.5px solid var(--g200)}
.btn-s:hover{background:var(--g200)}
.btn-f{width:100%;justify-content:center}
.btn-lg{padding:15px 28px;font-size:15px;border-radius:var(--rl)}

   APPLICATION STATE

const A={
  N:null,T:null,          // native, target language codes
  page:"home",            // home|levels|topics|lesson|quiz|saved
  lk:null,ti:null,        // levelKey, topicIndex
  tab:"v",                // v=vocab, e=examples
  qz:{qs:[],qi:0,ans:[],last:null,done:false},
  saved:JSON.parse(localStorage.getItem("mls")||"[]"),
  done:JSON.parse(localStorage.getItem("mld")||"{}"),
};
const save=()=>{localStorage.setItem("mls",JSON.stringify(A.saved));localStorage.setItem("mld",JSON.stringify(A.done));};

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
const u=k=>(UIS[A.N]||UIS.en)[k]||k;
const tn=o=>o?(o[A.N]||o.en||""):"";  // text in native
const tt=o=>o?(o[A.T]||o.en||""):"";  // text in target
const nd=()=>LM[A.N]?.dir==="rtl"?"rtl":"ltr";
const td=()=>LM[A.T]?.dir==="rtl"?"rtl":"ltr";
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const say=(t,l)=>{if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang=l||LM[A.T]?.tts||"en-US";u.rate=.82;speechSynthesis.speak(u);};
const pOf=k=>{const ts=C[k]?.topics||[];if(!ts.length)return 0;return Math.round(ts.filter((_,i)=>A.done[`${k}-${i}`]).length/ts.length*100);};
const totProg=()=>{const all=Object.values(C).reduce((a,l)=>a+l.topics.length,0);return all?Math.round(Object.values(A.done).filter(Boolean).length/all*100):0;};
const isSaved=tw=>A.saved.some(w=>w.t===tw);

/* ══════════════════════════════════════════════════════════
   QUIZ BUILDER — uses ONLY current lesson vocab
══════════════════════════════════════════════════════════ */
function buildQuiz(vocab){
  const pool=[...vocab].sort(()=>Math.random()-.5).slice(0,Math.min(8,vocab.length));
  return pool.map(w=>{
    const tw=w[A.T]||"",cN=w[A.N]||"";
    const wrongs=vocab.filter(x=>x[A.T]!==w[A.T]).sort(()=>Math.random()-.5).slice(0,3).map(x=>x[A.N]||"—");
    while(wrongs.length<3)wrongs.push("—");
    return{tw,cN,opts:[cN,...wrongs].sort(()=>Math.random()-.5)};
  });
}

/* ══════════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════════ */
function render(){
  const pg=document.getElementById("page");
  // bottom nav labels
  document.getElementById("nbl-home").textContent=u("home");
  document.getElementById("nbl-levels").textContent=u("levels");
  document.getElementById("nbl-saved").textContent=u("saved");
  ["home","levels","saved"].forEach(id=>{document.getElementById(`nb-${id}`).classList.toggle("on",A.page===id);});
  // header pair
  document.getElementById("hdr-pair").textContent=`${LM[A.N].flag} → ${LM[A.T].flag} ${LM[A.T].name}`;
  // direction
  pg.setAttribute("dir",nd());
  const R={home:rHome,levels:rLevels,topics:rTopics,lesson:rLesson,quiz:rQuiz,saved:rSaved};
  pg.innerHTML=(R[A.page]||rHome)();
  window.scrollTo(0,0);
}

/* ── HOME ── */
function rHome(){
  const pct=totProg(),dn=Object.values(A.done).filter(Boolean).length;
  const lvRows=Object.entries(C).map(([k,lv])=>{
    const p=pOf(k),isDn=p===100;
    return`<div class="lv-row${isDn?" lv-done":""}" data-a="openLv" data-k="${k}">
      <div class="lv-badge" style="background:${lv.col}">${k}</div>
      <div class="lv-info">
        <div class="lv-name">${tn(lv.title)}</div>
        <div class="lv-sub">${lv.topics.length} ${u("levels")} · ${k}</div>
        <div class="lv-mbar"><div class="lv-mfill" style="width:${p}%;background:${lv.col}"></div></div>
        <div class="lv-pct">${p}%</div>
      </div>
      <div class="lv-arrow">${isDn?"✅":"›"}</div>
    </div>`;
  }).join("");
  return`<div class="dash-banner">
    <div class="db-deco db-deco1"></div><div class="db-deco db-deco2"></div>
    <div class="db-greet">${LM[A.N].flag} ${LM[A.N].name}</div>
    <div class="db-title">${u("levels")}: ${LM[A.T].flag} ${LM[A.T].name}</div>
    <div class="db-pair">${LM[A.N].name} → ${LM[A.T].name}</div>
    <div class="prog-bar-wrap">
      <div class="pb-row"><span class="pb-lbl">${u("prog")}</span><span class="pb-val">${pct}%</span></div>
      <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
      <div class="pb-note">${dn} ${u("done")}</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-c"><div class="stat-v" style="color:var(--primary)">${dn}</div><div class="stat-l">${u("done")}</div></div>
    <div class="stat-c"><div class="stat-v" style="color:var(--success)">${A.saved.length}</div><div class="stat-l">${u("saved")}</div></div>
    <div class="stat-c"><div class="stat-v" style="color:var(--warning)">${pct}%</div><div class="stat-l">${u("prog").split(" ")[0]}</div></div>
  </div>
  <div class="sec-hdr"><span class="sec-ttl">${u("levels")}</span></div>
  <div class="lv-list au">${lvRows}</div>`;
}

/* ── LEVELS ── */
function rLevels(){
  const rows=Object.entries(C).map(([k,lv])=>{
    const p=pOf(k),isDn=p===100;
    return`<div class="lv-row${isDn?" lv-done":""}" data-a="openLv" data-k="${k}">
      <div class="lv-badge" style="background:${lv.col}">${k}</div>
      <div class="lv-info">
        <div class="lv-name">${tn(lv.title)}</div>
        <div class="lv-sub">${lv.topics.length} ${u("levels")} · ${k}</div>
        <div class="lv-mbar"><div class="lv-mfill" style="width:${p}%;background:${lv.col}"></div></div>
        <div class="lv-pct">${p}%</div>
      </div>
      <div class="lv-arrow">${isDn?"✅":"›"}</div>
    </div>`;
  }).join("");
  return`<div class="sec-hdr" style="padding-top:18px"><span class="sec-ttl">${u("levels")}</span></div>
  <div class="lv-list au">${rows}</div>`;
}

/* ── TOPICS ── */
function rTopics(){
  const lv=C[A.lk];if(!lv)return rHome();
  const cards=lv.topics.map((t,i)=>{
    const dn=A.done[`${A.lk}-${i}`];
    return`<div class="tp-card${dn?" tp-done":""} au" style="animation-delay:${i*.045}s" data-a="openLesson" data-i="${i}">
      ${dn?`<div class="tc-check">✓</div>`:""}
      <span class="tc-ico">${t.icon}</span>
      <div class="tc-name">${tn(t.title)}</div>
      <div class="tc-wc">${t.vocab.length} ${u("words")}</div>
    </div>`;
  }).join("");
  return`<div class="tp-hdr au">
    <span class="tp-pill" style="background:${lv.col}">${A.lk}</span>
    <div class="tp-title">${tn(lv.title)}</div>
  </div>
  <div class="tp-grid">${cards}</div>`;
}

/* ── LESSON ── */
function rLesson(){
  const lv=C[A.lk],tp=lv?.topics[A.ti];
  if(!tp){gp("topics");return"";}
  const tl=LM[A.T],tab=A.tab;

  const vRows=tp.vocab.map((w,i)=>{
    const tw=w[A.T]||"",nw=w[A.N]||"",sv=isSaved(tw);
    return`<div class="v-item asr" style="animation-delay:${i*.035}s">
      <div class="vi-emo">${w.e}</div>
      <div class="vi-txts">
        <div class="vi-tgt" dir="${td()}">${esc(tw)}</div>
        <span class="vi-sep">──────</span>
        <span class="vi-n-lbl">${u("trn")}</span>
        <div class="vi-nat" dir="${nd()}">${esc(nw)}</div>
      </div>
      <div class="vi-actions">
        <button class="aud-btn" data-a="say" data-tx="${esc(tw)}" data-lg="${tl.tts}">🔊</button>
        <button class="save-btn${sv?" saved":""}" data-a="sv" data-tw="${esc(tw)}" data-nw="${esc(nw)}" data-em="${w.e}">⭐</button>
      </div>
    </div>`;
  }).join("");

  const eCards=tp.ex.map((ex,i)=>{
    const ts=ex[A.T]||"",ns=ex[A.N]||"";
    return`<div class="e-card au" style="animation-delay:${i*.06}s">
      <span class="e-num">${u("exs")} ${i+1}</span>
      <div class="e-tgt-row">
        <div class="e-tgt-txt" dir="${td()}">${esc(ts)}</div>
        <button class="aud-btn" style="flex-shrink:0;width:32px;height:32px;font-size:13px" data-a="say" data-tx="${esc(ts)}" data-lg="${tl.tts}">🔊</button>
      </div>
      <div class="e-nat-wrap">
        <span class="e-nat-lbl">${u("trn")}</span>
        <div class="e-nat-txt" dir="${nd()}">${esc(ns)}</div>
      </div>
    </div>`;
  }).join("");

  return`<div class="ls-topbar">
    <button class="hdr-back" data-a="goTopics">←</button>
    <div class="ls-meta">
      <div class="ls-tag">${A.lk} · ${tn(lv.title)}</div>
      <div class="ls-title">${tp.icon} ${tn(tp.title)}</div>
    </div>
  </div>
  <div class="ls-tabs">
    <button class="ls-tab${tab==="v"?" on":""}" data-a="tab" data-tb="v">📖 ${u("vocab")}</button>
    <button class="ls-tab${tab==="e"?" on":""}" data-a="tab" data-tb="e">💬 ${u("exs")}</button>
  </div>
  ${tab==="v"?`
  <div class="v-pane">
    <div class="v-intro">
      <span class="v-intro-rule">${u("rule")}</span>
      <div class="v-intro-txt">${tn(tp.intro)}</div>
    </div>
    <div class="v-items">${vRows}</div>
  </div>
  <div class="q-cta" data-a="startQ">
    <div class="qcta-icon">🎯</div>
    <div><div class="qcta-ttl">${u("startQ")}</div><div class="qcta-sub">${tp.vocab.length} ${u("words")} · ${u("ruleT").split("·")[0].trim()}</div></div>
    <div class="qcta-arr">›</div>
  </div>`:`
  <div class="e-pane">
    <div class="e-intro-box">${u("eNote")}</div>
    ${eCards}
  </div>
  <div class="q-cta" data-a="startQ">
    <div class="qcta-icon">🎯</div>
    <div><div class="qcta-ttl">${u("startQ")}</div><div class="qcta-sub">${tp.vocab.length} ${u("words")}</div></div>
    <div class="qcta-arr">›</div>
  </div>`}`;
}

/* ── QUIZ ── */
function rQuiz(){
  const lv=C[A.lk],tp=lv?.topics[A.ti];
  if(!tp){gp("lesson");return"";}
  const q=A.qz;
  const tl=LM[A.T];

  // Results
  if(q.qi>=q.qs.length){
    const ok=q.ans.filter(Boolean).length,tot=q.qs.length,pct=Math.round(ok/tot*100);
    const pass=pct>=60;
    if(pass){A.done[`${A.lk}-${A.ti}`]=true;save();}
    const em=pct>=85?"🎉":pct>=60?"👍":"💪",msg=pct>=85?u("exc"):pct>=60?u("good"):u("keep");
    return`<div class="qz-wrap"><div class="qz-result ap">
      <span class="qr-emo">${em}</span>
      <div class="qr-sc" style="color:${pass?"var(--success)":"var(--danger)"}">${ok}</div>
      <div class="qr-of">${u("of")} ${tot} (${pct}%)</div>
      <div class="qr-msg">${msg}</div>
      <div class="qr-sub">${u("score")}: ${ok}/${tot}</div>
      <div class="qr-btns">
        <button class="btn btn-p btn-f btn-lg" data-a="retryQ">🔁 ${u("retry")}</button>
        <button class="btn btn-s btn-f btn-lg" data-a="goLesson">📖 ${u("backL")}</button>
      </div>
    </div></div>`;
  }

  const cur=q.qs[q.qi],pct=(q.qi/q.qs.length)*100,ansd=q.done;
  const opts=cur.opts.map(o=>{
    let cls="ans-btn";
    if(ansd){cls+=" qlk";if(o===cur.cN)cls+=" ans-reveal";else if(o===q.last&&o!==cur.cN)cls+=" ans-no";}
    return`<button class="${cls}" data-a="ans" data-av="${esc(o)}" data-cv="${esc(cur.cN)}" dir="${nd()}">${esc(o)}</button>`;
  }).join("");

  return`<div class="qz-wrap">
    <div class="qz-top">
      <div class="qz-bar"><div class="qz-fill" style="width:${pct}%"></div></div>
      <div class="qz-ctr">${q.qi+1}/${q.qs.length}</div>
    </div>
    <div class="qz-card ap">
      <span class="qz-lvl">${A.lk} · ${tn(tp.title)}</span>
      <div class="qz-word" dir="${td()}">${esc(cur.tw)}</div>
      <div class="qz-instr">${LM[A.N].name}?</div>
      <button class="qz-play" data-a="say" data-tx="${esc(cur.tw)}" data-lg="${tl.tts}">🔊</button>
    </div>
    <div class="ans-grid">${opts}</div>
    ${ansd?`<div class="fb-row"><span class="fb-chip ${q.ans[q.qi]?"fb-ok":"fb-no"}">${q.ans[q.qi]?u("correct"):u("wrong")}</span></div>
    <div class="qz-next-row"><button class="btn btn-p" data-a="nextQ">${q.qi+1<q.qs.length?u("next"):u("finish")}</button></div>`:""}
  </div>`;
}

/* ── SAVED ── */
function rSaved(){
  if(!A.saved.length)return`<div class="empty-box au">
    <span class="em-ico">⭐</span>
    <div class="em-ttl">${u("noSaved")}</div>
    <div class="em-sub">${u("noSavedS")}</div>
    <button class="btn btn-p" data-a="goLv">${u("goLevels")}</button>
  </div>`;
  const items=A.saved.map((w,i)=>`
  <div class="sw-item asr" style="animation-delay:${i*.04}s">
    <div class="sw-emo">${w.e||"📝"}</div>
    <div class="sw-info">
      <div class="sw-tgt" dir="${td()}">${esc(w.t)}</div>
      <div class="sw-nat" dir="${nd()}">${esc(w.n)}</div>
    </div>
    <button class="sw-rm" data-a="rmSv" data-i="${i}">✕</button>
    <button class="aud-btn" style="font-size:14px" data-a="say" data-tx="${esc(w.t)}" data-lg="${LM[A.T]?.tts||"en-US"}">🔊</button>
  </div>`).join("");
  return`<div class="sec-hdr" style="padding-top:18px"><span class="sec-ttl">⭐ ${u("saved")} (${A.saved.length})</span></div>
  <div class="sw-list">${items}</div>`;
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function gp(p){
  A.page=p;
  ["home","levels","saved"].forEach(id=>{document.getElementById(`nb-${id}`)?.classList.toggle("on",id===p);});
  render();
}
window.navTo=gp;

/* ══════════════════════════════════════════════════════════
   EVENT DELEGATION
══════════════════════════════════════════════════════════ */
document.getElementById("page").addEventListener("click",e=>{
  const el=e.target.closest("[data-a]");if(!el)return;
  const a=el.dataset.a;
  if(a==="say"){say(el.dataset.tx,el.dataset.lg);return;}
  if(a==="sv"){
    const tw=el.dataset.tw,nw=el.dataset.nw,em=el.dataset.em||"📝";
    const idx=A.saved.findIndex(w=>w.t===tw);
    idx>=0?A.saved.splice(idx,1):A.saved.push({t:tw,n:nw,e:em});
    save();render();return;
  }
  if(a==="rmSv"){A.saved.splice(parseInt(el.dataset.i),1);save();render();return;}
  if(a==="openLv"){A.lk=el.dataset.k;gp("topics");return;}
  if(a==="openLesson"){A.ti=parseInt(el.dataset.i);A.tab="v";gp("lesson");return;}
  if(a==="tab"){A.tab=el.dataset.tb;render();return;}
  if(a==="startQ"){
    const tp=C[A.lk]?.topics[A.ti];if(!tp)return;
    A.qz={qs:buildQuiz(tp.vocab),qi:0,ans:[],last:null,done:false};
    gp("quiz");return;
  }
  if(a==="ans"){
    if(A.qz.done)return;
    const av=el.dataset.av,cv=el.dataset.cv;
    A.qz.last=av;A.qz.done=true;A.qz.ans.push(av===cv);
    render();return;
  }
  if(a==="nextQ"){A.qz.qi++;A.qz.done=false;A.qz.last=null;render();return;}
  if(a==="retryQ"){const tp=C[A.lk]?.topics[A.ti];A.qz={qs:buildQuiz(tp.vocab),qi:0,ans:[],last:null,done:false};render();return;}
  if(a==="goTopics"){gp("topics");return;}
  if(a==="goLesson"){A.tab="v";gp("lesson");return;}
  if(a==="goLv"){gp("levels");return;}
});

/* ══════════════════════════════════════════════════════════
   WELCOME SCREEN LOGIC
══════════════════════════════════════════════════════════ */
function buildWelcome(){
  const ng=document.getElementById("native-grid"),tg=document.getElementById("target-grid");
  function mkCard(k,type){
    const m=LM[k],btn=document.createElement("button");
    btn.className="lang-btn";btn.dataset.lang=k;btn.dataset.type=type;
    btn.innerHTML=`<span class="l-flag">${m.flag}</span><div class="l-info"><div class="l-name">${m.name}</div><div class="l-nat">${m.nat}</div></div>`;
    btn.addEventListener("click",()=>pick(k,type));
    return btn;
  }
  Object.keys(LM).forEach(k=>{ng.appendChild(mkCard(k,"n"));tg.appendChild(mkCard(k,"t"));});
  refreshW();
}
function pick(k,type){
  if(type==="n"){A.N=k;if(A.T===k)A.T=null;}
  else{if(A.N===k)return;A.T=k;}
  refreshW();
}
function refreshW(){
  const u0=UIS[A.N||"en"];
  document.getElementById("lbl-native").textContent=u0.nl;
  document.getElementById("lbl-target").textContent=u0.tl;
  document.getElementById("go-text").textContent=u0.go;
  document.querySelectorAll("#native-grid .lang-btn").forEach(b=>{b.classList.toggle("sel",b.dataset.lang===A.N);b.disabled=false;});
  document.querySelectorAll("#target-grid .lang-btn").forEach(b=>{b.classList.toggle("sel",b.dataset.lang===A.T);const dis=b.dataset.lang===A.N;b.disabled=dis;b.classList.toggle("dis",dis);});
  const ok=A.N&&A.T&&A.N!==A.T;
  const btn=document.getElementById("go-btn");btn.disabled=!ok;btn.style.opacity=ok?"1":".32";
}
document.getElementById("go-btn").addEventListener("click",()=>{
  if(!A.N||!A.T||A.N===A.T)return;
  document.getElementById("s-welcome").classList.remove("on");
  document.getElementById("s-app").classList.add("on");
  gp("home");
});

/* ══════════════════════════════════════════════════════════
   SESSION RESTORE
══════════════════════════════════════════════════════════ */
(()=>{
  try{
    const s=JSON.parse(localStorage.getItem("mlsess")||"null");
    if(s&&s.n&&s.t&&LM[s.n]&&LM[s.t]&&s.n!==s.t){
      A.N=s.n;A.T=s.t;
      document.getElementById("s-welcome").classList.remove("on");
      document.getElementById("s-app").classList.add("on");
      gp("home");return;
    }
  }catch(_){}
  buildWelcome();
})();
window.addEventListener("beforeunload",()=>{if(A.N&&A.T)localStorage.setItem("mlsess",JSON.stringify({n:A.N,t:A.T}));});
</script>
</body>
</html>
